      const body = await res.json()
      if (Array.isArray(body)) {
        body.forEach(u => {
          const nick = (u.user_metadata && u.user_metadata.nickname) || u.email.split('@')[0]
          userMap[u.email] = { id: u.id, email: u.email, nickname: nick }
        })
      } else if (body.users && Array.isArray(body.users)) {
        body.users.forEach(u => {
          const nick = (u.user_metadata && u.user_metadata.nickname) || u.email.split('@')[0]
          userMap[u.email] = { id: u.id, email: u.email, nickname: nick }

    const uid = uidList[ui]

      { onConflict: 'cafe_id,user_id,tag', ignoreDuplicates: true }

    if (!error) tc++

    const uid = uidList[ui]

    await admin.from('cafes').update({ like_count: count || 0 }).eq('id', cafe.id)

      } else if (error) {
