<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CAFE MAP</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <div id="sidebar">
      <h1>☕ CAFE MAP</h1>

      <div id="auth-area">
        <div id="auth-logged-out">
          <div class="field">
            <label for="auth-email">メールアドレス</label>
            <input type="email" id="auth-email" />
          </div>
          <div class="field">
            <label for="auth-password">パスワード</label>
            <input type="password" id="auth-password" />
          </div>
          <div class="auth-buttons">
            <button id="auth-signup-btn">新規登録</button>
            <button id="auth-signin-btn">ログイン</button>
          </div>
        </div>
        <div id="auth-logged-in" style="display:none">
          <div id="auth-user-info">
            <span id="auth-email-display"></span>
            <button id="auth-signout-btn">ログアウト</button>
          </div>
        </div>
      </div>

      <div id="form-area" style="display:none">
        <h2>カフェを登録</h2>
        <form id="cafe-form">
          <div class="field">
            <label for="name">カフェ名</label>
            <input type="text" id="name" required />
          </div>
          <div class="field">
            <label for="address">住所</label>
            <input type="text" id="address" required />
          </div>
          <div class="field-row">
            <div class="field half">
              <label for="lat">緯度</label>
              <input type="number" id="lat" step="any" required />
            </div>
            <div class="field half">
              <label for="lng">経度</label>
              <input type="number" id="lng" step="any" required />
            </div>
          </div>
          <div class="field">
            <label for="comment">一言コメント</label>
            <input type="text" id="comment" />
          </div>
          <div class="field">
            <label for="hours">営業時間</label>
            <input type="text" id="hours" placeholder="例：9:00〜18:00" />
          </div>
          <div class="field">
            <label for="wifi">Wifi</label>
            <select id="wifi">
              <option value="">不明</option>
              <option value="yes">あり</option>
              <option value="no">なし</option>
            </select>
          </div>
          <div class="field">
            <label for="power">電源</label>
            <select id="power">
              <option value="">不明</option>
              <option value="yes">あり</option>
              <option value="no">なし</option>
            </select>
          </div>
          <div class="field">
            <label for="parking">駐車場</label>
            <select id="parking">
              <option value="">不明</option>
              <option value="yes">あり</option>
              <option value="no">なし</option>
            </select>
          </div>
          <div class="field">
            <label for="photo">写真</label>
            <input type="file" id="photo" accept="image/*" />
          </div>
          <button type="submit" id="register-btn">登録</button>
          <button type="button" id="cancel-btn">キャンセル</button>
        </form>
      </div>
    </div>
    <div id="map"></div>
  </div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
